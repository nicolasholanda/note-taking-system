<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout :: head('All notes')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container">
    <form th:action="@{/notes}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="q" class="form-control" placeholder="Search notes..." th:value="${q}">
            <button class="btn btn-outline-secondary" type="submit">Search</button>
            <a th:if="${q != null and !q.isBlank()}" th:href="@{/notes}" class="btn btn-outline-danger">Clear</a>
        </div>
    </form>

    <div th:if="${notes.isEmpty()}" class="text-center text-muted py-5">
        <p class="fs-5">No notes yet.</p>
        <a th:href="@{/notes/new}" class="btn btn-primary">Create your first note</a>
    </div>

    <div class="row g-3" th:unless="${notes.isEmpty()}">
        <div class="col-md-4" th:each="note : ${notes}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${note.title}">Title</h5>
                    <p class="card-text text-muted small note-preview" th:text="${note.content}"></p>
                </div>
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <small class="text-muted" th:text="${#temporals.format(note.updatedAt, 'MMM d, yyyy')}"></small>
                    <div>
                        <a th:href="@{/notes/{id}/edit(id=${note.id})}" class="btn btn-sm btn-outline-primary me-1">Edit</a>
                        <form th:action="@{/notes/{id}/delete(id=${note.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this note?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
